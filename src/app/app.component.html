<header class="site-header">
  <nav class="navbar">
    <a class="brand" routerLink="/home" aria-label="Borey Vimean Phnom Penh home">
      <img src="assets/images/bvmpp.png" alt="Borey Vimean Phnom Penh logo">
      <span>
        <strong>Borey Vimean Phnom Penh</strong>
        <small>លំនៅឋាននៃសុភមង្គល</small>
      </span>
    </a>

    <button class="menu-toggle" 
            [class.open]="isMenuOpen" 
            (click)="isMenuOpen = !isMenuOpen" 
            aria-label="Toggle navigation">
            <span class="hamburger-bar"></span>
            <span class="hamburger-bar"></span>
            <span class="hamburger-bar"></span>
    </button>

    <div class="nav-links" [class.show]="isMenuOpen">
      <a [routerLink]="['/home']" routerLinkActive="cta-link" (click)="isMenuOpen = false">About</a>
      <a routerLink="/property-list" routerLinkActive="cta-link" (click)="isMenuOpen = false">Properties</a>
      <a routerLink="/new-buildings" routerLinkActive="cta-link" (click)="isMenuOpen = false">New Buildings</a>
      <a routerLink="/promotion" routerLinkActive="cta-link" (click)="isMenuOpen = false">Promotion</a>
      <a [routerLink]="['/home']" routerLinkActive="cta-link" (click)="isMenuOpen = false">Location</a>
      <a routerLink="/new-promotion" routerLinkActive="cta-link" (click)="isMenuOpen = false">New-Promotion</a>
      <a routerLink="/registration" class="cta-link" (click)="isMenuOpen = false">Book a Visit</a>
   
    </div>
  </nav>
</header>

<main class="page-shell">
  <router-outlet></router-outlet>
</main>
